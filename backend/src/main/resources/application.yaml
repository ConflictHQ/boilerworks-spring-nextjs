server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: boilerworks-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5446}/${DB_NAME:boilerworks}
    username: ${DB_USER:boilerworks}
    password: ${DB_PASSWORD:boilerworks}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6389}
  session:
    store-type: redis
    timeout: 86400
    redis:
      namespace: boilerworks:session
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.boilerworks: DEBUG
    org.springframework.security: INFO
