services:

  api:
    build: ../backend
    container_name: boilerworks-api
    ports:
      - "8000:8087"
    environment:
      - SERVER_PORT=8087
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=boilerworks
      - DB_USER=boilerworks
      - DB_PASSWORD=boilerworks
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8087/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ui:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: boilerworks-ui
    ports:
      - "3000:3003"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_ROOT=http://api:8087
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: boilerworks-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=boilerworks
      - POSTGRES_USER=boilerworks
      - POSTGRES_PASSWORD=boilerworks
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boilerworks -d boilerworks"]
      interval: 3s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: boilerworks-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 3

  mailpit:
    image: axllent/mailpit:latest
    container_name: boilerworks-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  minio:
    profiles: ["storage"]
    image: minio/minio:latest
    container_name: boilerworks-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  minio-data:
